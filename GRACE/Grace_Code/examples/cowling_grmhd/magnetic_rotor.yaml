name: "grace"
amr: {
  npoints_block_x: 32,
  npoints_block_y: 32,
  npoints_block_z: 32,

  xmin: -0.5,
  xmax: 0.5,

  ymin: -0.5,
  ymax: 0.5,

  zmin: -0.1,
  zmax: 0.1,

  periodic_z: true,

  n_ghostzones: 4,
  initial_refinement_level: 1,

  max_refinement_level: 7,
  regrid_every: -1,

  regrid_at_postinitial: false
}

IO: {

  plane_surface_output_cell_variables: ["hydro"],
  plane_surface_output_every: 10,

  info_output_every: 2,
  info_output_max_reductions: ["rho", "press", "Bvec[1]", "Bdiv"],
  info_output_min_reductions: ["rho", "press", "Bvec[1]"], 

  scalar_output_every: 10,
  scalar_output_minmax: ["rho","press","eps","Bdiv"],
  scalar_output_norm2: ["Bdiv"],

  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,

  output_extra_quantities: true,

  xy_plane_offset: 1e-5
}

evolution: {
  time_stepper: "rk4",
  cfl_factor: 0.25,
  final_time: 0.45
}

grmhd: {
  id_type: "magnetic_rotor",
  B_field_initialization: "direct"
}

system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_severity_level: "trace",
  n_device_streams: 4
}

eos: {
  eos_type: "hybrid",

  hybrid_eos: {
    cold_eos_type: "piecewise_polytrope",
    gamma_th: 1.66666666667,
  },

  eps_maximum: 1.e+05,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [2.],
    rhos:   [],
    kappa_0: 0.
  }
}

