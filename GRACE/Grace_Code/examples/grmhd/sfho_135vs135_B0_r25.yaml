name: "grace"
amr: {
  npoints_block_x: 32,
  npoints_block_y: 32,
  npoints_block_z: 32,
  xmin: -1024.0,
  xmax: 1024.0,
  ymin: -1024.0,
  ymax: 1024.0,
  zmin: -1024.0,
  zmax: 1024.0,


  n_ghostzones: 4,
  initial_refinement_level: 2,
  max_refinement_level: 7,

  regrid_every: -1,

  n_fmr_boxes: 6,

  fmr_boxes: [
    {
      target_level_delta: 1,
      x_min: -512,
      x_max: 512,
      y_min: -512,
      y_max: 512,
      z_min: -512,
      z_max: 512
    },

    {
      target_level_delta: 2,
      x_min: -256,
      x_max: 256,
      y_min: -256,
      y_max: 256,
      z_min: -256,
      z_max: 256
    },

    {
      target_level_delta: 3,
      x_min: -128,
      x_max: 128,
      y_min: -128,
      y_max: 128,
      z_min: -128,
      z_max: 128
    },

    {
      target_level_delta: 4,
      x_min: -96,
      x_max: 96,
      y_min: -96,
      y_max: 96,
      z_min: -96,
      z_max: 96
    },

    {
      target_level_delta: 5,
      x_min: -64,
      x_max: 64,
      y_min: -64,
      y_max: 64,
      z_min: -64,
      z_max: 64
    },


    {
      target_level_delta: 6,
      x_min: -32,
      x_max: 32,
      y_min: -32,
      y_max: 32,
      z_min: -32,
      z_max: 32
    },

  ]


}

IO: {
  volume_output_cell_variables: ["rho","press","eps","vel[0]", "alp", "beta[0]"],
  volume_output_base_directory: "output_volume",
  volume_output_every: -1,

  plane_surface_output_cell_variables: ["metric", "hydro", "c2p_err"],
  plane_surface_output_every: 100,

  sphere_surface_output_every: -1,

  info_output_every: 2,
  info_output_max_reductions: ["rho"],
  info_output_min_reductions: ["alp"],
  info_output_norm2_reductions: ["z4c_H"],

  scalar_output_every: 1,
  scalar_output_minmax: ["rho","press","eps","alp"],
  scalar_output_norm2: ["z4c_H"],
  scalar_output_integral: ["dens"],

  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,
  output_extra_quantities: true,

  # GW 
  diagnostic_output_every: 1

}

system: {
  console_log_level: "info",
  file_log_level: "info",
  n_device_streams: 4
}

evolution: {
  time_stepper: "rk4",
  cfl_factor: 0.4,
  termination_condition: "walltime",
  final_walltime: 23.5
}


grmhd: {
  id_type: "lorene_bns",

  lorene_bns: {
    filename: "/u/cmusolino/bns_id/lorene/sfho/135vs135/resu.d",
    set_shift_to_zero: true,
    reset_eps: false
  },

  atmosphere: {
    rho_fl: 1e-14,
    temp_fl: 0.01
  },
  
  excision: {
    excision_criterion: "lapse",
    excision_lapse: 0.05
  },

  c2p: {
    use_c2p_entropy_backup: false
  }
}

eos: {
  eos_type: "tabulated",

  tabulated_eos: {
    table_filename: "/u/cmusolino/eos/stellarcollapse/sfho/Hempel_SFHoEOS_rho222_temp180_ye60_version_1.1_20120817.h5",
    table_format: "stellarcollapse",
    cold_table_filename: "/u/cmusolino/eos/stellarcollapse/sfho/sfho.grace"
  },
  
  eps_maximum: 1.e+05
}

z4c: {
  eps_diss: 0.25,

  eta: 0.25,

  eta_damp_radius: 512
}

spherical_surfaces: {
  n_surfaces: 3,

  spherical_detectors: [
    {
      name: "GW_1",
      radius: 300,
      resolution: 91
    },

    {
      name: "GW_2",
      radius: 500,
      resolution: 91
    },

    {
      name: "mass_outflows",
      radius: 750,
      resolution: 91
    }
  ]
}

gw_integrals: {
  detector_names: ["GW_1", "GW_2"]
}

outflows: {
  detector_names: ["GW_1", "GW_2"]
}

ns_tracker: {
  ns_number: 2,
  ns_x_initial: [-15.2, 15.2],
  ns_y_initial: [0,0],
  ns_z_initial: [0,0],
  density_threshold: 1e-6,
  output_frequency: 2
}