name: "grace"
# Requires a GRACE build with GRACE_ENABLE_M1=ON and GRACE_M1_NUM_SPECIES=3.
amr: {
  npoints_block_x: 32,
  npoints_block_y: 32,
  npoints_block_z: 32,
  xmin: -1024.0,
  xmax: 1024.0,
  ymin: -1024.0,
  ymax: 1024.0,
  zmin: -1024.0,
  zmax: 1024.0,

  n_ghostzones: 4,
  initial_refinement_level: 2,
  max_refinement_level: 7,

  regrid_every: -1,

  n_fmr_boxes: 6,

  fmr_boxes: [
    {
      target_level_delta: 1,
      x_min: -512,
      x_max: 512,
      y_min: -512,
      y_max: 512,
      z_min: -512,
      z_max: 512
    },

    {
      target_level_delta: 2,
      x_min: -256,
      x_max: 256,
      y_min: -256,
      y_max: 256,
      z_min: -256,
      z_max: 256
    },

    {
      target_level_delta: 3,
      x_min: -128,
      x_max: 128,
      y_min: -128,
      y_max: 128,
      z_min: -128,
      z_max: 128
    },

    {
      target_level_delta: 4,
      x_min: -96,
      x_max: 96,
      y_min: -96,
      y_max: 96,
      z_min: -96,
      z_max: 96
    },

    {
      target_level_delta: 5,
      x_min: -64,
      x_max: 64,
      y_min: -64,
      y_max: 64,
      z_min: -64,
      z_max: 64
    },

    {
      target_level_delta: 6,
      x_min: -32,
      x_max: 32,
      y_min: -32,
      y_max: 32,
      z_min: -32,
      z_max: 32
    }
  ]
}

IO: {
  volume_output_cell_variables: [
    "rho", "press", "temperature", "ye",
    "Erad", "Nrad", "Erad1", "Nrad1", "Erad2", "Nrad2",
    "Frad[0]", "Frad[1]", "Frad[2]",
    "Frad1[0]", "Frad1[1]", "Frad1[2]",
    "Frad2[0]", "Frad2[1]", "Frad2[2]",
    "eta", "eta_1", "eta_2",
    "eta_n", "eta_n_1", "eta_n_2",
    "kappa_a", "kappa_a_1", "kappa_a_2",
    "kappa_s", "kappa_s_1", "kappa_s_2",
    "kappa_n", "kappa_n_1", "kappa_n_2"
  ],
  volume_output_base_directory: "output_volume_bns_neutrinos",
  volume_output_every: 200,

  plane_surface_output_cell_variables: ["metric", "hydro", "Erad", "Erad1", "Erad2"],
  plane_surface_output_every: 100,

  sphere_surface_output_every: -1,

  info_output_every: 2,
  info_output_max_reductions: ["rho", "Erad", "Erad1", "Erad2"],
  info_output_min_reductions: ["alp"],
  info_output_norm2_reductions: ["z4c_H"],

  scalar_output_every: 1,
  scalar_output_minmax: ["rho", "press", "eps", "alp", "Erad", "Erad1", "Erad2"],
  scalar_output_norm2: ["z4c_H"],
  scalar_output_integral: ["dens"],

  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,
  output_extra_quantities: true,

  diagnostic_output_every: 1
}

system: {
  console_log_level: "info",
  file_log_level: "info",
  n_device_streams: 4
}

evolution: {
  time_stepper: "imex222",
  cfl_factor: 0.2,
  termination_condition: "walltime",
  final_walltime: 23.5
}

grmhd: {
  id_type: "lorene_bns",

  lorene_bns: {
    filename: "/u/cmusolino/bns_id/lorene/sfho/135vs135/resu.d",
    set_shift_to_zero: true,
    reset_eps: false
  },

  atmosphere: {
    rho_fl: 1e-14,
    temp_fl: 0.01
  },

  excision: {
    excision_criterion: "lapse",
    excision_lapse: 0.05
  },

  c2p: {
    use_c2p_entropy_backup: false
  }
}

m1: {
  id_type: "zero",

  atmosphere: {
    E_fl: 1e-14,
    E_scaling: 0.0,
    eps_fl: 1.0,
    eps_scaling: 0.0,
    eps_min: 1.0,
    eps_max: 10.0
  },

  excision: {
    E_excision: 1e-14,
    eps_excision: 1.0
  },

  eas: {
    kind: "neutrino_analytic",
    species_mode: "three",
    use_analytic: true,
    use_weakhub: false,
    beta_decay: true,
    plasmon_decay: true,
    bremsstrahlung: true,
    pair_annihilation: true,
    tau_policy: "local_spherical",
    tau_outer_radius_code: 200.0,
    betaeq_policy: "off",
    temperature_correction: true
  }
}

eos: {
  eos_type: "tabulated",

  tabulated_eos: {
    table_filename: "/u/cmusolino/eos/stellarcollapse/sfho/Hempel_SFHoEOS_rho222_temp180_ye60_version_1.1_20120817.h5",
    table_format: "stellarcollapse",
    cold_table_filename: "/u/cmusolino/eos/stellarcollapse/sfho/sfho.grace"
  },

  eps_maximum: 1.e+05
}

z4c: {
  eps_diss: 0.25,
  eta: 0.25,
  eta_damp_radius: 512
}

spherical_surfaces: {
  n_surfaces: 3,

  spherical_detectors: [
    {
      name: "GW_1",
      radius: 300,
      resolution: 91
    },

    {
      name: "GW_2",
      radius: 500,
      resolution: 91
    },

    {
      name: "mass_outflows",
      radius: 750,
      resolution: 91
    }
  ]
}

gw_integrals: {
  detector_names: ["GW_1", "GW_2"]
}

outflows: {
  detector_names: ["GW_1", "GW_2"]
}

ns_tracker: {
  ns_number: 2,
  ns_x_initial: [-15.2, 15.2],
  ns_y_initial: [0, 0],
  ns_z_initial: [0, 0],
  density_threshold: 1e-6,
  output_frequency: 2
}
