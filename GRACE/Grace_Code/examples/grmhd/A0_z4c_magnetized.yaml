# Resolution 0.16666 M 
name: "grace"
amr: {
  npoints_block_x: 48,
  npoints_block_y: 48,
  npoints_block_z: 48,
  xmin: -128.0,
  xmax: 128.0,
  ymin: -128.0,
  ymax: 128.0,
  zmin: -128.0,
  zmax: 128.0,

  reflection_symmetries: {
    x: false,
    y: false,
    z: false
  }, 

  n_ghostzones: 4,
  initial_refinement_level: 2,

  max_refinement_level: 7,

  regrid_every: -1,
  
  n_fmr_boxes: 3,
  fmr_boxes: [
    {
      target_level_delta: 1,
      x_min: -64,
      x_max: 64,
      y_min: -64,
      y_max: 64,
      z_min: -64,
      z_max: 64
    },
    {
      target_level_delta: 2,
      x_min: -32,
      x_max: 32,
      y_min: -32,
      y_max: 32,
      z_min: -32,
      z_max: 32
    },
    {
      target_level_delta: 3,
      x_min: -16,
      x_max: 16,
      y_min: -16,
      y_max: 16,
      z_min: -16,
      z_max: 16
    }
  ]
}

IO: {
  plane_surface_output_cell_variables: ["rho","alp","z4c_H", "z4c_M[0]", "beta[0]", "z4c_Khat", "gamma_tilde[0,0]", "gamma_tilde[0,1]", "gamma_tilde[0,2]", "gamma_tilde[1,1]", "gamma_tilde[1,2]", "gamma_tilde[2,2]", "z4c_theta", "conf_fact", "z4c_Gamma[0]","A_tilde[0,0]","A_tilde[0,1]","zvec[0]","c2p_err","Bvec[0]","Bdiv"],
  plane_surface_output_every: 500,

  sphere_surface_output_every: -1,

  info_output_every: 2,
  info_output_max_reductions: ["rho"],
  info_output_min_reductions: ["alp"],
  info_output_norm2_reductions: ["z4c_H"],

  scalar_output_every: 10,
  scalar_output_minmax: ["rho","press","eps","alp"],
  scalar_output_norm2: ["z4c_H"],
  scalar_output_integral: [],

  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,
  output_extra_quantities: true,

  xy_plane_offset: 1e-5,
  xz_plane_offset: 1e-5,
  yz_plane_offset: 1e-5

}
system: {
  console_log_level: "info",
  file_log_level: "info",
  n_device_streams: 4
}
evolution: {
  time_stepper: "rk3",
  cfl_factor: 0.2,
  final_walltime: 23,
  termination_condition: "walltime"
}

grmhd: {
  id_type: "tov",

  tov: {
    rho_c: 1.28e-3,
    press_floor: 1e-15,
    dr: 1e-3
  },

  atmosphere: {
    temp_fl:  1e-10,
    rho_fl: 1.e-10
  },

  c2p: {
    tolerance: 1e-10,
    max_lorentz: 50,
    use_c2p_entropy_backup: false
  },

  B_field_initialization: "from_Avec",

  Avec_ID: {
    cutoff_var: "press",
    cutoff_fact: 0.02,
    A_phi: 100,
    A_n: 2
  }

}

z4c: {
  eps_diss: 0.1,
  # roughly 2/M 
  eta: 1.4
}

eos: {
  eos_type: "hybrid",

  hybrid_eos: {
    cold_eos_type: "piecewise_polytrope",
    gamma_th: 2.0
  },
  
  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [2.],
    rhos:   [],
    kappa_0: 100.
  },

  eps_maximum: 1.e+05,
}