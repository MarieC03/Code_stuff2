name: "grace"
amr: {
  periodic_x: true,
  npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -1.,
  xmax: 1.,
  ymin: -2.,
  ymax: 2.,
  zmin: -1.,
  zmax: 1.,
  n_ghostzones: 2,
  initial_refinement_level: 0,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 5,
  regrid_every: 50,
  postinitial_regrid_depth: 5,
}
IO: {
  volume_output_cell_variables: ["U"],
  plane_surface_output_cell_variables: ["U"],
  volume_output_every: 1000,
  plane_surface_output_every: 50,
  info_output_every: 20,
  info_output_max_reductions: ["U"],
  info_output_min_reductions: ["U"],
  scalar_output_every: 50,
  scalar_output_minmax: ["U"],
  scalar_output_norm2: ["U"],
  scalar_output_integral: ["U"],
  output_use_hdf5: true, 
  hdf5_compression_level: 6,
  hdf5_chunk_size: 8192
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.8,
  final_time: 1.,
  reset_id_after_regrid: true
}
scalar_advection: {
  ax: 2.,
  ay: 0.,
  az: 0.,
  gaussian_sigma: 0.1
}