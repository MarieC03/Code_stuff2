amr: {
  npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -512.0,
  xmax: 512.0,
  ymin: -512.0,
  ymax: 512.0,
  zmin: -512.0,
  zmax: 512.0,

  n_ghostzones: 4,
  initial_refinement_level: 2,
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false,
  n_fmr_boxes: 1,
  fmr_box_0: {
    target_level_delta: 1,
    x_min: -256,
    x_max: 256,
    y_min: -256,
    y_max: 256,
    z_min: -256,
    z_max: 256
  },
  fmr_box_1: {
    target_level_delta: 2,
    x_min: -128,
    x_max: 128,
    y_min: -128,
    y_max: 128,
    z_min: -128,
    z_max: 128
  },
  fmr_box_2: {
  	     target_level_delta: 3,
    x_min: -96,
    x_max: 96,
    y_min: -96,
    y_max: 96,
    z_min: -96,
    z_max: 96
    },
  fmr_box_3: {
    target_level_delta: 4,
    x_min: -64,
    x_max: 64,
    y_min: -64,
    y_max: 64,
    z_min: -64,
    z_max: 64
  },
  do_regrid_test: false
}
IO: {
  volume_output_cell_variables: [ "Bvec[0]","dens","Bdiv"],
  output_extra_quantities: true,
  hdf5_compression_level: 0
}
system: {
  console_log_level: "verbose",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace",
  n_device_streams: 4
}

checkpoints: {
  checkpoint_at_termination: false
}