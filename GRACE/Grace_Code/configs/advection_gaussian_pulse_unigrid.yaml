name: "grace"
amr: {
  npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -1.,
  xmax: 1.,
  ymin: -1.,
  ymax: 1.,
  zmin: -2.,
  zmax: 2.,
  n_ghostzones: 2,
  initial_refinement_level: 4,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.5,
  refinement_criterion_CTODE: 2.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false
}
IO: {
  volume_output_cell_variables: ["U", "err"],
  volume_output_every: -1
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: false,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.2,
  final_time: 1.
}
