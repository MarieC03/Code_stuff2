    par_P_minus_x: 0.0,
    par_P_minus_y: 0.133,
    par_P_minus_z: 0.0,
    par_S_minus_x: 0.0,
    par_S_minus_y: 0.0,
    par_S_minus_z: 0.0,

    npoints_A: 30,
    npoints_B: 30,
    npoints_phi: 16,

    TP_epsilon: 0.0
  }
}

