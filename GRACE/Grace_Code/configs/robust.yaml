name: "grace"
amr: {
  npoints_block_x: 50,
  npoints_block_y: 50,
  npoints_block_z: 50,

  xmin: 0.0,
  xmax: 1.0,
  ymin: 0.0,
  ymax: 1.0,
  zmin: 0.0,
  zmax: 1.0,

  periodic_x: true,
  periodic_y: true,
  periodic_z: true,

  n_ghostzones: 4,
  initial_refinement_level: 2,
  
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false,

  n_fmr_boxes: 0
}

IO: {
  plane_surface_output_cell_variables: ["z4c_H", "z4c_M[0]", "beta[0]", "z4c_Khat", "gamma_tilde[0,0]", "gamma_tilde[0,1]", "gamma_tilde[0,2]", "gamma_tilde[1,1]", "gamma_tilde[1,2]", "gamma_tilde[2,2]", "z4c_theta", "conf_fact", "z4c_Gamma[0]","A_tilde[0,0]","A_tilde[0,1]","A_tilde[0,2]","A_tilde[1,1]","A_tilde[1,2]","A_tilde[2,2]","alp"],
  plane_surface_output_every: 50,

  info_output_every: 2,
  info_output_max_reductions: ["conf_fact"],
  info_output_min_reductions: ["alp","conf_fact"],
  info_output_norm2_reductions: ["z4c_H"],

  scalar_output_every: 2,
  scalar_output_minmax: ["z4c_H","conf_fact","alp"],
  scalar_output_norm2: ["z4c_H"],
  scalar_output_integral: [],

  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,
  output_extra_quantities: true,

  output_plane_z_origin_0: 1e-5,
}
system: {
  console_log_level: "info",
  file_log_level: "info",
  flush_logs_based_on_severity: false,
  flush_level: "trace",
  n_device_streams: 4
}
evolution: {
  time_stepper: "rk3",
  cfl_factor: 0.1,
  final_time: 10
}

grmhd: {
  id_type: "robust_stability",
  robust_stability_rho: 1
}

z4c: {
  kappa_1: 0.0,
  kappa_2: 0.0,
  eta: 0.,
  eps_diss: 0.0,
  is_vacuum: true
}

