name: "grace"
amr: {
  npoints_block_x: 32,
  npoints_block_y: 32,
  npoints_block_z: 32,
  xmin: -0.5,
  xmax: 0.5,
  ymin: -1.0,
  ymax: 1.0,
  zmin: -0.5,
  zmax: 0.5,
  periodic_x: true,
  periodic_z: true,
  n_ghostzones: 4,
  initial_refinement_level: 3,
  refinement_criterion: "shear",
  refinement_criterion_CTORE: 0.01,
  refinement_criterion_CTODE: 0.005,
  max_refinement_level: 6,
  regrid_every: -1,
  regrid_at_postinitial: false,
}
IO: {
  plane_surface_output_cell_variables: ["rho","vel[0]","Bdiv","Bvec[0]"],
  volume_output_cell_variables: ["rho","vel[0]"],
  volume_output_base_directory: "output_volume",
  volume_output_every: -1,

  plane_surface_output_every: 50,
  sphere_surface_output_every: -1,

  info_output_every: 50,
  info_output_max_reductions: ["rho","Bdiv"],
  info_output_min_reductions: ["rho"],

  scalar_output_every: 10,
  scalar_output_minmax: ["rho","Bdiv"],
  scalar_output_norm2: [],
  scalar_output_integral: [],
  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,
  output_extra_quantities: true,
  do_initial_output: true
}
system: {
  console_log_level: "info",
  file_log_level: "verbose",
  flush_logs_based_on_severity: false,
  flush_level: "trace",
  n_device_streams: 4
}
evolution: {
  time_stepper: "rk3",
  cfl_factor: 0.2,
  final_time: 15,
}
grmhd: {
  id_type: "khi",
  atmosphere: {
    ye_fl: 0,
    temp_fl:  0,
    rho_fl: 1.e-10,
    rho_scaling: 0,
    temp_scaling: 0
  },
  B_field_from_Avec: false 
}

eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",

  eps_maximum: 1.e+05,
  gamma_th: 1.33333333,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [2.],
    rhos:   [],
    kappa_0: 0.
  }
}
profiling: {
  do_gpu_profiling: false
}