m1:
  description: >
    M1 scheme
  type: schema

  bc_kind:
    type: keyword
    allowed: ["outgoing", "none"]
    default: "outgoing"
    description: >
      Boundary conditions

  id_type:
    type: keyword
    allowed: ["straight_beam", "scattering", "moving_scattering", "shadow", "emitting_sphere", "zero", "curved_beam", "coupling_test"]
    default: "zero"
    description: >
      Initialization prescription for radiation fields

  atmosphere:
    type: schema
    description: >
      Atmosphere settings for M1

    E_fl:
      type: double
      range: "(0,*)"
      default: 1.e-14
      description: >
        Floor of energy density

    E_scaling:
      type: double
      range: "[0,*)"
      default: 0
      description: >
        Radial dependence of energy density floor

    eps_fl:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Flooring value for average energy

    eps_scaling:
      type: double
      range: "[0,*)"
      default: 0
      description: >
        Radial dependence of the average-energy floor

    eps_min:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Minimum allowed average energy

    eps_max:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Maximum allowed average energy

  excision:
    type: schema
    description: >
      Excision parameters for M1 transport

    E_excision:
      type: double
      default: 1.e-14
      range: "(0,*)"
      description: >
        Value of energy density inside excised regions

    eps_excision:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Value of average energy inside excised regions


  eas:
    type: schema
    description: >
      Parameters controlling emission, absorption, and scattering rates.
      The canonical GRACE interface lives under m1.eas.*.

    kind:
      type: keyword
      allowed: ["test", "photon_rates", "neutrino_analytic", "neutrino_weakhub"]
      default: "test"
      description: >
        Rate prescription. Use neutrino_analytic for the FIL-style 3-spec
        analytic rates, and neutrino_weakhub for the tabulated Weakhub rates.

    species_mode:
      type: keyword
      allowed: ["build_default", "one", "three", "five"]
      default: "build_default"
      description: >
        Requested active neutrino-species layout. Use "three" for
        (nu_e, anti-nu_e, nu_x) and "five" for
        (nu_e, anti-nu_e, nu_mu, anti-nu_mu, nu_x). The run-time choice must
        match the executable build selected through GRACE_M1_NUM_SPECIES.

    use_analytic:
      type: bool
      default: false
      description: >
        Legacy compatibility switch for selecting the analytic neutrino rates.
        Usually leave this false and select the rates treatment via
        m1.eas.kind.

    use_weakhub:
      type: bool
      default: false
      description: >
        Legacy compatibility switch for selecting the Weakhub neutrino rates.
        Keep this consistent with m1.eas.kind.

    weakhub_table:
      type: string
      default: "weakhub_grey.h5"
      description: >
        HDF5 path to the Weakhub grey-opacity table. Three-species runs require
        the 3-spec table, while five-species muonic runs require the 6-spec
        Y_mu-dependent table from FIL/Margherita.

    beta_decay:
      type: bool
      default: true
      description: >
        Include charged-current beta-process contributions.

    plasmon_decay:
      type: bool
      default: true
      description: >
        Include plasmon-decay contributions where supported by the selected
        rates treatment.

    bremsstrahlung:
      type: bool
      default: true
      description: >
        Include nucleon-nucleon bremsstrahlung contributions where supported by
        the selected rates treatment.

    pair_annihilation:
      type: bool
      default: true
      description: >
        Include pair-annihilation contributions where supported by the selected
        rates treatment.

    tau_policy:
      type: keyword
      allowed: ["none", "analytic_density", "local_spherical"]
      default: "local_spherical"
      description: >
        Optical-depth closure used by the analytic and Weakhub add-on rates.

    tau_outer_radius_code:
      type: double
      default: 200.0
      range: "(0,*)"
      description: >
        Outer radius, in code units, used by the local_spherical tau policy.

    betaeq_policy:
      type: keyword
      allowed: ["off", "chemical"]
      default: "off"
      description: >
        Optional beta-equilibrium override for the composition passed to the
        rates.

    temperature_correction:
      type: bool
      default: true
      description: >
        Apply the FIL-style temperature correction in the neutrino rates.

  scattering_test:
    type: schema
    description: >
      Parameters of scattering test

    k_s:
      type: double
      default: 100
      range: "(0,*)"
      description: >
        Constant scattering opacity

    t_0:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Time of initial data

    is_static_background:
      type: bool
      default: true
      description: >
        Is background fluid static or moving?

  emitting_sphere_test:
    type: schema
    description: >
      Parameters for emitting sphere test

    temperature:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Temperature for rates

    cross_section:
      type: double
      default: 10
      range: "(0,*)"
      description: >
        Cross section for rates

